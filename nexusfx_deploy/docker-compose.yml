version: '3.8'

services:
  # =============================================
  # PostgreSQL Database
  # =============================================
  db:
    image: postgres:16-alpine
    container_name: nexusfx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusfx_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-nexusfx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # NexusFX Backend API
  # =============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusfx-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-nexusfx_secure_password}@db:5432/${POSTGRES_DB:-nexusfx}
      JWT_SECRET: ${JWT_SECRET:-nexusfx-production-secret-change-this}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://nexusfx.biz,http://nexusfx.biz,https://www.nexusfx.biz}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # =============================================
  # NexusFX Frontend Web Server (Nginx)
  # =============================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusfx-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
    driver: local
