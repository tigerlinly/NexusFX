services:
  mt5-node-1:
    build: .
    container_name: nexusfx-mt5-node-1
    privileged: true
    ports:
      - "8080:8080"
      - "5900:5900"
    volumes:
      - mt5-data-1:/root/.wine
      - ./../EA/Infra_Data:/root/ea-source/Infra_Data
    environment:
      - WINEDEBUG=-all
      - WINEDLLOVERRIDES=winedbg.exe=d;dbghelp=d
    restart: always

volumes:
  mt5-data-1:
