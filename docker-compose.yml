version: '3.8'

services:
  # =============================================
  # NexusFX Backend API
  # =============================================
  # =============================================
  # NexusFX Database (PostgreSQL)
  # =============================================
  db:
    image: postgres:16-alpine
    container_name: nexusfx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexusfx_secure_password
      POSTGRES_DB: nexusfx
    ports:
      - "5433:5432"
    volumes:
      - nexusfx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexusfx"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusfx-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:nexusfx_secure_password@host.docker.internal:5433/nexusfx
      JWT_SECRET: ${JWT_SECRET:-nexusfx-production-secret-change-this}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://nexusfx.biz,http://nexusfx.biz,https://www.nexusfx.biz,http://203.151.66.51}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  # =============================================
  # NexusFX Frontend Web Server (Nginx)
  # =============================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusfx-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt

  # =============================================
  # Certbot (SSL Certificate Auto-Renewal)
  # =============================================
  certbot:
    image: certbot/certbot
    container_name: nexusfx-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./frontend/dist:/var/www/html
    depends_on:
      - web
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done'"

  # =============================================
  # NexusFX MT5 Node (Wine + VNC)
  # =============================================
  mt5-node-1:
    build:
      context: ./docker-mt5-node
      dockerfile: Dockerfile
    container_name: nexusfx-mt5-node-1
    privileged: true
    ports:
      - "8080:8080"
      - "5900:5900"
    volumes:
      - mt5-data-1:/root/.wine
      - ./EA:/root/ea-source
    environment:
      - WINEDEBUG=-all
      - WINEDLLOVERRIDES=winedbg.exe=d;dbghelp=d
    restart: unless-stopped

volumes:
  certbot-etc:
    driver: local
  certbot-var:
    driver: local
  mt5-data-1:
  nexusfx_pgdata:
    external: true
