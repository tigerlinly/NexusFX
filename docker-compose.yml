version: '3.8'

services:
  # =============================================
  # NexusFX Backend API
  # =============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusfx-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ชี้ไปยัง Database Data Center ของระบบที่รันอยู่บนเครื่องเดียวกัน (ใช้ host.docker.internal เพื่อแก้ EHOSTUNREACH)
      DATABASE_URL: postgresql://nexus_admin:N3xusFX_DataC3nter2026!@host.docker.internal:5432/nexus_datacenter
      JWT_SECRET: ${JWT_SECRET:-nexusfx-production-secret-change-this}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://nexusfx.biz,http://nexusfx.biz,https://www.nexusfx.biz,http://203.151.66.51}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # =============================================
  # NexusFX Frontend Web Server (Nginx)
  # =============================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusfx-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt

  # =============================================
  # Certbot (SSL Certificate Auto-Renewal)
  # =============================================
  certbot:
    image: certbot/certbot
    container_name: nexusfx-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./frontend/dist:/var/www/html
    depends_on:
      - web
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done'"

volumes:
  certbot-etc:
    driver: local
  certbot-var:
    driver: local
