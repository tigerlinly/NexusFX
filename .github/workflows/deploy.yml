name: Deploy to INET Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Production (INET)
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          echo "🔄 Starting NexusFX deployment..."
          cd /var/www/nexusfx
          git pull origin main

      - name: Rebuild & restart containers
        run: |
          cd /var/www/nexusfx
          docker-compose up -d --build api web

      - name: Wait for health check
        run: sleep 5

      - name: Verify deployment
        run: |
          echo "📦 Container Status:"
          docker ps --format 'table {{.Names}}\t{{.Status}}'
          
          echo "🏥 API Health Check:"
          curl -sf http://localhost:4000/api/health && echo " OK" || echo " FAIL"
          
          echo "✅ NexusFX deployment complete! $(date)"
