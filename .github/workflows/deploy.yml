name: Deploy to INET Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Production (INET)
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          echo "🔄 Starting NexusFX deployment..."
          cd /var/www/nexusfx
          git checkout -- .
          git pull origin main

      - name: Rebuild & restart api and web only (keep DB running)
        run: |
          cd /var/www/nexusfx
          docker compose build api web
          docker compose stop api web
          docker compose rm -f api web
          docker compose up -d api web

      - name: Wait for health check
        run: sleep 8

      - name: Verify deployment
        run: |
          echo "📦 Container Status:"
          docker ps --format 'table {{.Names}}\t{{.Status}}'

          echo "🏥 API Health Check:"
          curl -sf http://localhost:4000/api/health && echo " OK" || echo " FAIL"

          echo "✅ NexusFX deployment complete! $(date)"
