name: NexusFX CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # =============================================
  # Job 1: Backend Syntax & Security Check
  # =============================================
  backend-check:
    name: 🔧 Backend Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Syntax check
        working-directory: ./backend
        run: |
          node -e "
            const files = ['./routes/admin.js', './routes/auth.js'];
            files.forEach(f => { try { require(f); console.log('✅', f); } catch(e) { console.error('❌', f, e.message); process.exit(1); } });
          "

      - name: Security audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true

  # =============================================
  # Job 2: Frontend Build
  # =============================================
  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Report build size
        working-directory: ./frontend
        run: |
          echo "📦 Build output:"
          du -sh dist/
          ls -lh dist/assets/

  # =============================================
  # Job 3: Deploy notification (actual deploy via deploy.yml self-hosted runner)
  # =============================================
  deploy:
    name: ✅ Deploy Status
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Summary
        run: |
          echo "### 🚀 Build & Deploy Triggered" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy:** Handled by Self-hosted Runner (deploy.yml)" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** nexusfx.biz (INET)" >> $GITHUB_STEP_SUMMARY
